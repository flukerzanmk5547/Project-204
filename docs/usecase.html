<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;background:#0c1a2b;}
  svg{display:block;font-family:"Segoe UI","Noto Sans Thai",Tahoma,sans-serif;}
</style>
</head>
<body>
<svg id="d" width="1120" height="730" viewBox="0 0 1120 730" xmlns="http://www.w3.org/2000/svg"></svg>
<script>
const NS="http://www.w3.org/2000/svg";
const svg=document.getElementById("d");
function el(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
function text(x,y,s,o={}){const t=el("text",Object.assign({x,y,"text-anchor":"middle","dominant-baseline":"middle",fill:o.fill||"#eaf3fb","font-size":o.fs||11,"font-weight":o.fw||400},o.attr||{}));t.textContent=s;svg.appendChild(t);return t;}

svg.appendChild(el("rect",{x:0,y:0,width:1120,height:730,fill:"#0c1a2b"}));
text(560,36,"แผนภาพ Use Case — ระบบ Sport Store",{fs:24,fw:800,fill:"#ffffff"});
text(560,62,"บทบาทผู้ใช้ 4 ระดับ: ลูกค้า · พนักงาน · ผู้ดูแลระบบ · ผู้ดูแลระบบสูงสุด (+ PromptPay)",{fs:12.5,fill:"#8fb0c8"});

svg.appendChild(el("rect",{x:300,y:96,width:520,height:492,rx:16,fill:"#0f2237",stroke:"#2f5a7d","stroke-width":1.5}));
text(560,118,"ระบบ Sport Store",{fs:14,fw:700,fill:"#46b6d9"});
[332,394,510].forEach(y=>svg.appendChild(el("line",{x1:318,y1:y,x2:802,y2:y,stroke:"#274a68","stroke-width":1.1,"stroke-dasharray":"5 5"})));

const colX=[392,560,728];
const PW=152,PH=34;
const C_BLUE="#3d7bf7", E_AMBER="#e0a03c", A_TEAL="#28b295", S_PURPLE="#a06be0";

const UC=[
 {t:"ดู / ค้นหาสินค้า",x:colX[0],y:150,g:"c"},
 {t:"ดูรายละเอียดสินค้า",x:colX[1],y:150,g:"c"},
 {t:"สมัครสมาชิก",x:colX[2],y:150,g:"c"},
 {t:"เข้าสู่ระบบ",x:colX[0],y:198,g:"c"},
 {t:"จัดการตะกร้า",x:colX[1],y:198,g:"c",id:"cart"},
 {t:"จัดการสินค้าโปรด",x:colX[2],y:198,g:"c"},
 {t:"จัดการที่อยู่จัดส่ง",x:colX[0],y:246,g:"c"},
 {t:"สั่งซื้อ (Checkout)",x:colX[1],y:246,g:"c",id:"co"},
 {t:"ชำระเงิน PromptPay",x:colX[2],y:246,g:"c",id:"pay"},
 {t:"ดูประวัติคำสั่งซื้อ",x:colX[0],y:294,g:"c"},
 {t:"เขียนรีวิวสินค้า",x:colX[1],y:294,g:"c"},

 {t:"ตรวจสอบคำสั่งซื้อ",x:colX[0],y:362,g:"e"},
 {t:"อัปเดตสถานะคำสั่งซื้อ",x:colX[1],y:362,g:"e"},
 {t:"จัดการสต็อกสินค้า",x:colX[2],y:362,g:"e"},

 {t:"จัดการสินค้า / หมวดหมู่",x:colX[0],y:424,g:"a"},
 {t:"แบนเนอร์ / โปรโมชัน",x:colX[1],y:424,g:"a"},
 {t:"หน้าแรก / ชุดสินค้า",x:colX[2],y:424,g:"a"},
 {t:"ดูรายงานยอดขาย",x:colX[0],y:472,g:"a"},

 {t:"จัดการบัญชีผู้ดูแลระบบ",x:colX[0],y:544,g:"s"},
 {t:"กำหนดสิทธิ์การเข้าถึง",x:colX[1],y:544,g:"s"},
 {t:"ตั้งค่าระบบ",x:colX[2],y:544,g:"s"},
];
const pos={};UC.forEach(u=>{if(u.id)pos[u.id]=u;});

function actor(cx,cy,name,sub,color){
  const s=color||"#cfe3f5";
  const g=el("g",{});
  g.appendChild(el("circle",{cx,cy:cy-24,r:8.5,fill:"none",stroke:s,"stroke-width":2.1}));
  g.appendChild(el("line",{x1:cx,y1:cy-15,x2:cx,y2:cy+9,stroke:s,"stroke-width":2.1}));
  g.appendChild(el("line",{x1:cx-14,y1:cy-5,x2:cx+14,y2:cy-5,stroke:s,"stroke-width":2.1}));
  g.appendChild(el("line",{x1:cx,y1:cy+9,x2:cx-12,y2:cy+27,stroke:s,"stroke-width":2.1}));
  g.appendChild(el("line",{x1:cx,y1:cy+9,x2:cx+12,y2:cy+27,stroke:s,"stroke-width":2.1}));
  svg.appendChild(g);
  text(cx,cy+44,name,{fs:13,fw:800,fill:"#ffffff"});
  if(sub)text(cx,cy+59,sub,{fs:10,fill:"#8fb0c8"});
}
const CUST={x:100,y:210}, PP={x:100,y:440}, EMP={x:1015,y:352}, ADMIN={x:1015,y:462}, SADMIN={x:1015,y:590};

const defs=el("defs",{});
defs.innerHTML=`<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa7b5"/></marker>`;
svg.appendChild(defs);

function link(x1,y1,x2,y2,o={}){
  svg.appendChild(el("path",{d:`M ${x1} ${y1} C ${(x1+x2)/2} ${y1}, ${(x1+x2)/2} ${y2}, ${x2} ${y2}`,
    fill:"none",stroke:o.stroke||"#4a7fae","stroke-width":o.w||1.25,opacity:0.75}));
}
UC.filter(u=>u.g==="c").forEach(u=>link(CUST.x+15,CUST.y-4,u.x-PW/2,u.y,{stroke:"#3763a0"}));
UC.filter(u=>u.g==="e").forEach(u=>link(EMP.x-15,EMP.y-4,u.x+PW/2,u.y,{stroke:"#a8762a"}));
UC.filter(u=>u.g==="a").forEach(u=>link(ADMIN.x-15,ADMIN.y-4,u.x+PW/2,u.y,{stroke:"#1f7a6e"}));
UC.filter(u=>u.g==="s").forEach(u=>link(SADMIN.x-15,SADMIN.y-4,u.x+PW/2,u.y,{stroke:"#7a52ad"}));
link(PP.x+15,PP.y-4,pos.pay.x-PW/2,pos.pay.y,{stroke:"#c98b3a",w:1.5});

svg.appendChild(el("path",{d:`M ${pos.co.x+PW/2} ${pos.co.y} L ${pos.pay.x-PW/2} ${pos.pay.y}`,fill:"none",stroke:"#9aa7b5","stroke-width":1.1,"stroke-dasharray":"5 4","marker-end":"url(#ar)"}));
text((pos.co.x+pos.pay.x)/2,pos.co.y-12,"«include»",{fs:8.5,fill:"#9aa7b5"});

// inheritance chain
svg.appendChild(el("path",{d:`M ${ADMIN.x} ${ADMIN.y-34} L ${EMP.x} ${EMP.y+34}`,fill:"none",stroke:"#9aa7b5","stroke-width":1.2,"stroke-dasharray":"5 4","marker-end":"url(#ar)"}));
svg.appendChild(el("path",{d:`M ${SADMIN.x} ${SADMIN.y-34} L ${ADMIN.x} ${ADMIN.y+34}`,fill:"none",stroke:"#9aa7b5","stroke-width":1.2,"stroke-dasharray":"5 4","marker-end":"url(#ar)"}));
text(SADMIN.x-56,(SADMIN.y+ADMIN.y)/2+16,"สืบทอดสิทธิ์",{fs:9,fill:"#9aa7b5"});
text(EMP.x-56,(ADMIN.y+EMP.y)/2+16,"สืบทอดสิทธิ์",{fs:9,fill:"#9aa7b5"});

UC.forEach(u=>{
  const c=u.g==="c"?C_BLUE:(u.g==="e"?E_AMBER:(u.g==="a"?A_TEAL:S_PURPLE));
  svg.appendChild(el("rect",{x:u.x-PW/2,y:u.y-PH/2,width:PW,height:PH,rx:PH/2,fill:"#14304d",stroke:c,"stroke-width":1.7}));
  text(u.x,u.y,u.t,{fs:10,fw:600,fill:"#eaf3fb"});
});

actor(CUST.x,CUST.y,"ลูกค้า","Customer / Guest");
actor(PP.x,PP.y,"PromptPay","ระบบชำระเงิน (External)","#e0b072");
actor(EMP.x,EMP.y,"พนักงาน","Employee","#f0c583");
actor(ADMIN.x,ADMIN.y,"ผู้ดูแลระบบ","Admin","#7fd8c6");
actor(SADMIN.x,SADMIN.y,"ผู้ดูแลระบบสูงสุด","Super Admin","#c9a6ef");
</script>
</body>
</html>
